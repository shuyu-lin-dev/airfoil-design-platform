# 运行遥测模板
#
# 每次会话结束时，复制下方模板填充实际值，保存为 runs/YYYY-MM-DD-telemetry.yaml。
# 字段均为人工估算值，不需要精确到 API 调用级——粗略的结构化记录足以支撑趋势分析。
#
# 累积统计在下方 cumulative 区块中滚动更新。

# ── 模板（每次运行复制此块） ──
# - run_id: YYYY-MM-DD-<task_id>
#   task_id: T001
#   status: passing          # passing | blocked | abandoned
#   duration_min: 45         # 人工估算，含思考、编码和验证
#   model: deepseek-v4-pro   # 本次会话使用的模型
#   token_estimate: 80000    # 从对话轮数和文件读取量粗略估算（输入+输出）
#   tool_calls:
#     total: 34
#     file_reads: 12
#     file_edits: 8
#     shell_commands: 10
#     tests_run: 4
#   failures:
#     test_failures: 2
#     validation_retries: 1
#     blocked_issues: 0
#   notes: ""                # 可选：本次运行的显著事件

# ── 运行记录 ──
runs:
  - run_id: 2026-05-30-selfcheck
    task_id: maintenance    # 非功能开发任务，项目自检 + 目录修复
    status: passing
    duration_min: 25
    model: deepseek-v4-pro
    token_estimate: 30000
    tool_calls:
      total: 22
      file_reads: 8
      file_edits: 4
      shell_commands: 8
      tests_run: 1
    failures:
      test_failures: 0
      validation_retries: 0
      blocked_issues: 0
    notes: "项目自检 + 删除空嵌套目录 backend/backend/；首次发现并记录 9 步协议 6 步遗漏违规"
  - run_id: 2026-05-30-selfcheck-2
    task_id: maintenance    # 项目自检 #2 — 代码结构拆分 + 冲刺合同补建
    status: passing
    duration_min: 180
    model: deepseek-v4-pro
    token_estimate: 120000
    tool_calls:
      total: 45
      file_reads: 15
      file_edits: 12
      shell_commands: 14
      tests_run: 3
    failures:
      test_failures: 0
      validation_retries: 1
      blocked_issues: 1
    notes: "全面对照 spec.md 自检；修复6项代码结构违规(文件≤200行/函数≤50行)；补建12个轻量冲刺合同；pre-commit零违规；104 tests pass"

# ── 累积统计（每次运行后滚动更新） ──
cumulative:
  total_sessions: 2
  total_tasks_completed: 0
  total_duration_min: 205
  total_tool_calls: 67
  total_test_failures: 0
  avg_token_per_session: 75000
  tasks_by_status:
    passing: 0
    blocked: 0
    abandoned: 0
  model_usage:
    deepseek-v4-pro: 2
