      - 不改变 condition、wing_planform 和 material_properties。
      - fitness 固定为 wing_lift_drag_ratio / weight，其中 wing_lift_drag_ratio 是展向积分后的三维机翼升阻比（第一版矩形等截面直翼假设下退化为恒等映射），weight 是全翼结构重量。
