version: 1
project: airfoil-design-platform
language: zh-CN
workflow:
  wip_limit: 1
  status_values:
    - not_started
    - active
    - blocked
    - passing
  rules:
    - 一次只激活一个任务。
    - 任务只能修改 allowed_paths 中列出的路径。
    - 只有 validation.commands 通过后，任务才能标记为 passing。
    - 每次任务结束必须更新 tasks.tasks[].evidence 和 PROGRESS.md。
    - 任务必须原子化：每个任务只承担一个可独立验证的关注点，单次会话内可完成。
feature_schema:
  required_fields:
    - id
    - title
    - behavior
    - status
    - evidence
    - validation.commands
    - checklist
  optional_fields:
    - parallelizable_group
  note: 每个任务同时是功能清单项，必须能回答行为、验证、状态和证据四件事。任务描述应能用一句话概括，且那句话里不能有"和"。
  parallelizable_group_note: 同一 group 内的任务具有相同的 depends_on 且 allowed_paths 互不相交，可在独立 worktree 中并行执行。当前 WIP=1 约束针对单 agent 会话；多 agent 场景下，同一 group 的任务可由不同 agent 并行处理，通过 integration branch 汇合。
  checklist_note: checklist 继承自 default_checklist，任务可通过 checklist_overrides 追加或移除项。标记 passing 前必须逐项确认为 [x]。
default_checklist:
  - pytest 通过
  - git commit（单任务单 commit）
  - tasks.yaml status + evidence 更新
  - PROGRESS.md 更新
  - DECISIONS.md 补充（若有新决策/依赖/pitfall）
  - learnings 写入（若发现新陷阱/模式/规则冲突）
  - telemetry.yaml 填写
  - .harness/state/working/ 清理除 .gitkeep 外所有文件

tasks:
  - id: T000
    title: 初始化项目内 harness
    behavior: 仓库具备 agent 入口、进度、决策、任务、初始化契约和验证闭环，后续会话能从 T001 接手。
    status: passing
    checklist: default
    evidence: 已创建项目内 harness 文件和 .harness/instruction/rules 规则集；基础存在性检查已通过。
    depends_on: []
    allowed_paths:
      - AGENTS.md
      - PROGRESS.md
      - DECISIONS.md
      - tasks/**
      - docs/spec.md
      - docs/api-contracts.md
      - .harness/instruction/rules/**
      - .harness/**
    expected_outputs:
      - AGENTS.md
      - PROGRESS.md
      - DECISIONS.md
      - tasks/tasks.yaml
      - docs/spec.md
      - docs/api-contracts.md
      - .harness/instruction/rules/agent-workflow.md
      - .harness/instruction/rules/domain-constraints.md
      - .harness/instruction/rules/testing.md
      - .harness/instruction/rules/artifact-policy.md
      - .harness/instruction/rules/architecture-boundaries.md
      - .harness/instruction/bootstrap-contract.md
      - .harness/feedback/definition-of-done.md
      - .harness/feedback/session-exit-checklist.md
      - .harness/state/sprint-contracts/T001-backend-skeleton.md
      - .harness/instruction/template-compliance.md
      - .harness/state/runs/2026-05-27-bootstrap.md
    acceptance_criteria:
      - 仓库有 agent 入口文件。
      - 仓库有任务清单、进度文件和 API 契约摘要。
      - 仓库有分层规则文件，AGENTS.md 只做入口路由。
      - 后续 agent 能从 T001 开始执行。
    validation:
      commands:
        - test -f AGENTS.md
        - test -f PROGRESS.md
        - test -f DECISIONS.md
        - test -f tasks/tasks.yaml
        - test -f docs/spec.md
        - test -f docs/api-contracts.md
        - test -f .harness/instruction/rules/agent-workflow.md
        - test -f .harness/instruction/rules/domain-constraints.md
        - test -f .harness/instruction/rules/testing.md
        - test -f .harness/instruction/rules/artifact-policy.md
        - test -f .harness/instruction/rules/architecture-boundaries.md
        - test -f .harness/instruction/bootstrap-contract.md
        - test -f .harness/feedback/definition-of-done.md
        - test -f .harness/feedback/session-exit-checklist.md
        - test -f .harness/state/sprint-contracts/T001-backend-skeleton.md
        - test -f .harness/instruction/template-compliance.md

  - id: T001
    title: Backend skeleton
    behavior: 后端调用者可以通过 FastAPI TestClient 访问健康检查，并能运行最小测试命令。
    status: passing
    checklist: default
    evidence: pytest 1 passed — test_health_returns_ok 通过 TestClient 验证 GET /health 返回 200、status=ok、version=0.2.0
    depends_on:
      - T000
    allowed_paths:
      - backend/**
      - .harness/state/sprint-contracts/T001-backend-skeleton.md
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/README.md
      - backend/pyproject.toml
      - backend/src/airfoil_platform/__init__.py
      - backend/src/airfoil_platform/main.py
      - backend/tests/__init__.py
      - backend/tests/test_health.py
    acceptance_criteria:
      - FastAPI 应用可以被 TestClient 加载。
      - GET /health 返回 status 和 version。
      - 后端测试命令可运行。
    validation:
      commands:
        - cd backend && pytest

  - id: T002
    title: Common contracts and config
    behavior: 后端具备公共请求响应契约和配置默认值，能拒绝核心非法输入。
    status: not_started
    checklist: default
    evidence: ""
    depends_on:
      - T001
    allowed_paths:
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/config/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/src/airfoil_platform/contracts/__init__.py
      - backend/src/airfoil_platform/contracts/common.py
      - backend/src/airfoil_platform/config/__init__.py
      - backend/src/airfoil_platform/config/settings.py
    acceptance_criteria:
      - cst_params 必须正好 12 个数。
      - 比例字段必须满足 0 < ratio <= 1。
      - wing_planform 可选字段 span 和 chord 单位均为 m，默认值和硬校验范围来自 settings。
      - 结构设计参数包含 rear_spar_web_thickness、rib_thickness 和 rib_spacing，单位均为 m，且满足硬校验范围。
      - material_properties 区分 skin 和 internal_structure，出现的材料组必须同时提供 elastic_modulus 和 material_density。
      - 默认机翼平面参数、默认蒙皮材料、默认内部结构材料、重力加速度、artifact 根目录和 stub 模式来自 settings。
      - 公共结果元信息包含 is_stub 和 model_version。
    validation:
      commands:
        - cd backend && pytest

