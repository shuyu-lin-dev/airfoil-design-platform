version: 1
project: airfoil-design-platform
language: zh-CN
workflow:
  wip_limit: 1
  status_values:
    - not_started
    - active
    - blocked
    - passing
  rules:
    - 一次只激活一个任务。
    - 任务只能修改 allowed_paths 中列出的路径。
    - 只有 validation.commands 通过后，任务才能标记为 passing。
    - 每次任务结束必须更新 tasks.tasks[].evidence 和 PROGRESS.md。
feature_schema:
  required_fields:
    - id
    - title
    - behavior
    - status
    - evidence
    - validation.commands
  note: 每个任务同时是功能清单项，必须能回答行为、验证、状态和证据四件事。

tasks:
  - id: T000
    title: 初始化项目内 harness
    behavior: 仓库具备 agent 入口、进度、决策、任务、初始化契约和验证闭环，后续会话能从 T001 接手。
    status: passing
    evidence: 已创建项目内 harness 文件和 .harness/instruction/rules 规则集；基础存在性检查已通过。
    depends_on: []
    allowed_paths:
      - AGENTS.md
      - PROGRESS.md
      - DECISIONS.md
      - tasks/**
      - docs/spec.md
      - docs/api-contracts.md
      - .harness/instruction/rules/**
      - .harness/**
    expected_outputs:
      - AGENTS.md
      - PROGRESS.md
      - DECISIONS.md
      - tasks/tasks.yaml
      - docs/spec.md
      - docs/api-contracts.md
      - .harness/instruction/rules/agent-workflow.md
      - .harness/instruction/rules/domain-constraints.md
      - .harness/instruction/rules/testing.md
      - .harness/instruction/rules/artifact-policy.md
      - .harness/instruction/rules/architecture-boundaries.md
      - .harness/instruction/bootstrap-contract.md
      - .harness/feedback/definition-of-done.md
      - .harness/feedback/session-exit-checklist.md
      - .harness/state/sprint-contracts/T001-backend-skeleton.md
      - .harness/instruction/template-compliance.md
      - .harness/state/runs/2026-05-27-bootstrap.md
    acceptance_criteria:
      - 仓库有 agent 入口文件。
      - 仓库有任务清单、进度文件和 API 契约摘要。
      - 仓库有分层规则文件，AGENTS.md 只做入口路由。
      - 后续 agent 能从 T001 开始执行。
    validation:
      commands:
        - test -f AGENTS.md
        - test -f PROGRESS.md
        - test -f DECISIONS.md
        - test -f tasks/tasks.yaml
        - test -f docs/spec.md
        - test -f docs/api-contracts.md
        - test -f .harness/instruction/rules/agent-workflow.md
        - test -f .harness/instruction/rules/domain-constraints.md
        - test -f .harness/instruction/rules/testing.md
        - test -f .harness/instruction/rules/artifact-policy.md
        - test -f .harness/instruction/rules/architecture-boundaries.md
        - test -f .harness/instruction/bootstrap-contract.md
        - test -f .harness/feedback/definition-of-done.md
        - test -f .harness/feedback/session-exit-checklist.md
        - test -f .harness/state/sprint-contracts/T001-backend-skeleton.md
        - test -f .harness/instruction/template-compliance.md

  - id: T001
    title: Backend skeleton
    behavior: 后端调用者可以通过 FastAPI TestClient 访问健康检查，并能运行最小测试命令。
    status: not_started
    evidence: ""
    depends_on:
      - T000
    allowed_paths:
      - backend/**
      - .harness/state/sprint-contracts/T001-backend-skeleton.md
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/README.md
      - backend/pyproject.toml
      - backend/src/airfoil_platform/main.py
      - backend/tests/test_health.py
    acceptance_criteria:
      - FastAPI 应用可以被 TestClient 加载。
      - GET /health 返回 status 和 version。
      - 后端测试命令可运行。
    validation:
      commands:
        - cd backend && pytest

  - id: T002
    title: Common contracts
    behavior: 后端具备公共请求响应契约和配置默认值，能拒绝核心非法输入。
    status: not_started
    evidence: ""
    depends_on:
      - T001
    allowed_paths:
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/config/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/src/airfoil_platform/contracts/common.py
      - backend/src/airfoil_platform/config/settings.py
    acceptance_criteria:
      - cst_params 必须正好 12 个数。
      - 比例字段必须满足 0 < ratio <= 1。
      - 默认材料属性、重力加速度、artifact 根目录和 stub 模式来自 settings。
      - 公共结果元信息包含 is_stub 和 model_version。
    validation:
      commands:
        - cd backend && pytest

  - id: T003
    title: Geometry 2D API
    behavior: 后端调用者提交 12 个 CST 参数后，可以获得 200 个二维翼型点和结果元信息。
    status: not_started
    evidence: ""
    depends_on:
      - T002
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/src/airfoil_platform/api/geometry.py
      - backend/src/airfoil_platform/contracts/geometry.py
      - backend/src/airfoil_platform/core/geometry.py
      - backend/src/airfoil_platform/services/geometry_service.py
      - backend/tests/test_geometry_api.py
    acceptance_criteria:
      - POST /geometry/airfoil-2d 接收 12 个 CST 参数。
      - 返回 200 个二维翼型点。
      - 前 100 个点表示上表面，后 100 个点表示下表面。
      - 响应包含 is_stub true 和 model_version stub-v0。
    validation:
      commands:
        - cd backend && pytest

  - id: T004
    title: Aerodynamic artifact API
    behavior: 后端调用者提交 CST 参数和工况参数后，可以获得气动标量、Cp 分布和可查询的 HDF5 场数据 artifact。
    status: not_started
    evidence: ""
    depends_on:
      - T003
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/src/airfoil_platform/models/**
      - backend/src/airfoil_platform/artifacts/**
      - backend/src/airfoil_platform/lib/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/src/airfoil_platform/api/aerodynamics.py
      - backend/src/airfoil_platform/api/artifacts.py
      - backend/src/airfoil_platform/artifacts/hdf5_store.py
      - backend/src/airfoil_platform/artifacts/artifact_registry.py
      - backend/tests/test_aerodynamics_api.py
      - backend/tests/test_artifacts_api.py
    acceptance_criteria:
      - POST /aerodynamics/predict 返回 lift_drag_ratio、200 个 Cp 点和 field_artifact。
      - 压力场和速度场写入 HDF5，不直接通过 JSON 返回。
      - HDF5 包含 /coordinates、/fields/pressure、/fields/velocity。
      - 同名 JSON sidecar 存在。
      - GET /artifacts/{artifact_id} 可读取 sidecar 元信息。
    validation:
      commands:
        - cd backend && pytest

  - id: T005
    title: Geometry 3D API
    behavior: 后端调用者提交翼型、机翼平面和结构设计输入后，可以获得 1000 个三维机翼几何点。
    status: not_started
    evidence: ""
    depends_on:
      - T002
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/tests/test_geometry_api.py
    acceptance_criteria:
      - POST /geometry/wing-3d 接收 CST 参数、机翼平面参数和完整结构设计参数。
      - 返回 1000 个三维机翼几何点。
      - 坐标系固定为 x = 弦向、y = 厚度方向、z = 展向。
    validation:
      commands:
        - cd backend && pytest

  - id: T006
    title: Structure prediction API
    behavior: 后端调用者提交三维机翼相关输入后，可以获得应力极值和重量结果。
    status: not_started
    evidence: ""
    depends_on:
      - T005
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/src/airfoil_platform/models/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/src/airfoil_platform/api/structure.py
      - backend/src/airfoil_platform/contracts/structure.py
      - backend/src/airfoil_platform/services/structure_service.py
      - backend/tests/test_structure_api.py
    acceptance_criteria:
      - POST /structure/predict 返回 max_stress 和 weight。
      - weight 单位为 N。
      - API 不暴露 mass。
      - 可选材料属性缺省时使用 settings 默认值。
    validation:
      commands:
        - cd backend && pytest

  - id: T007
    title: Aerodynamic optimization API
    behavior: 后端调用者提交气动优化请求后，可以获得原始与优化后的 CST 参数和升阻比对比。
    status: not_started
    evidence: ""
    depends_on:
      - T004
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/src/airfoil_platform/optimization/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/src/airfoil_platform/api/optimization.py
      - backend/src/airfoil_platform/contracts/optimization.py
      - backend/src/airfoil_platform/services/optimization_service.py
      - backend/tests/test_optimization_api.py
    acceptance_criteria:
      - POST /optimization/aerodynamic 只改变 cst_params。
      - condition 不改变。
      - 返回 original、optimized 和 actual_improvement_ratio。
      - target_improvement_ratio 使用小数表达。
    validation:
      commands:
        - cd backend && pytest

  - id: T008
    title: Structural optimization API
    behavior: 后端调用者提交强度优化请求后，可以获得只改变结构优化变量的重量减轻结果。
    status: not_started
    evidence: ""
    depends_on:
      - T006
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/src/airfoil_platform/optimization/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/tests/test_optimization_api.py
    acceptance_criteria:
      - POST /optimization/structural 只改变 spar_thickness 和 rib_spacing。
      - 不改变 skin_thickness、condition、wing_planform 和 material_properties。
      - 返回 original、optimized 和 actual_reduction_ratio。
      - target_reduction_ratio 使用小数表达。
    validation:
      commands:
        - cd backend && pytest

  - id: T009
    title: Coupled optimization API
    behavior: 后端调用者提交耦合优化请求后，可以获得气动与强度耦合适应度提升结果。
    status: not_started
    evidence: ""
    depends_on:
      - T007
      - T008
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/src/airfoil_platform/optimization/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/tests/test_optimization_api.py
    acceptance_criteria:
      - POST /optimization/coupled 可改变 cst_params、spar_thickness 和 rib_spacing。
      - 不改变 skin_thickness、condition、wing_planform 和 material_properties。
      - fitness 固定为 lift_drag_ratio / weight。
      - 返回 original、optimized 和 actual_improvement_ratio。
    validation:
      commands:
        - cd backend && pytest

  - id: T010
    title: Teaching airfoil generation API
    behavior: 教学调用者提交中弧线和厚度趋势控制点后，可以获得 200 个二维翼型点。
    status: not_started
    evidence: ""
    depends_on:
      - T003
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/src/airfoil_platform/api/teaching.py
      - backend/src/airfoil_platform/contracts/teaching.py
      - backend/src/airfoil_platform/services/teaching_service.py
      - backend/tests/test_teaching_api.py
    acceptance_criteria:
      - POST /teaching/airfoil-from-control-points 接收 2 个中弧线教学控制点和 2 个厚度分布教学控制点。
      - 返回 200 个二维翼型点。
      - 教学控制点不承诺 Bezier 或 B-spline 算法。
    validation:
      commands:
        - cd backend && pytest

  - id: T011
    title: Teaching CST inverse API
    behavior: 教学调用者提交 200 个二维翼型点后，可以获得 12 个 CST 参数。
    status: not_started
    evidence: ""
    depends_on:
      - T010
    allowed_paths:
      - backend/src/airfoil_platform/api/**
      - backend/src/airfoil_platform/contracts/**
      - backend/src/airfoil_platform/core/**
      - backend/src/airfoil_platform/services/**
      - backend/tests/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/tests/test_teaching_api.py
    acceptance_criteria:
      - POST /teaching/cst-from-airfoil 接收 200 个二维翼型点。
      - 返回 12 个 CST 参数。
      - CST 顺序为前 6 个上表面系数，后 6 个下表面系数。
    validation:
      commands:
        - cd backend && pytest

  - id: T012
    title: Documentation pass
    behavior: 后续维护者可以通过 README 和 docs 理解目标、非目标、运行测试命令、字段单位和 artifact 策略。
    status: not_started
    evidence: ""
    depends_on:
      - T009
      - T011
    allowed_paths:
      - backend/README.md
      - backend/.gitignore
      - backend/docs/**
      - docs/**
      - PROGRESS.md
      - tasks/tasks.yaml
    expected_outputs:
      - backend/README.md
      - backend/.gitignore
      - backend/docs/spec.md
      - backend/docs/api-contracts.md
    acceptance_criteria:
      - 文档说明目标、非目标、字段单位、目录边界、artifact 策略、运行命令和测试命令。
      - backend/runtime_artifacts/ 被忽略。
      - docs 与实现保持一致。
    validation:
      commands:
        - cd backend && pytest
