      - HDF5 文件可写入 runtime_artifacts/aerodynamic/<id>.h5。
      - 同名 JSON sidecar 同步落盘，包含 artifact_id、format、role、path、status、datasets。
      - artifact_registry 可通过 artifact_id 查询已注册 artifact 的元信息。
      - HDF5 dataset 布局包含 /coordinates (1000,2)、/fields/pressure (1000,)、/fields/velocity (1000,)。
      - 测试不依赖任何 HTTP API，纯 Python 测试验证存储层。
    validation:
