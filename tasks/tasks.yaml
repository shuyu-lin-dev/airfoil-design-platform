      - backend/src/airfoil_platform/core/geometry.py（追加三维 CAD 生成逻辑）
      - backend/src/airfoil_platform/services/geometry_service.py（追加三维编排逻辑）
      - backend/tests/test_geometry_api.py（追加 wing-3d 测试）
    notes:
      - 本任务扩展 T003 已创建的文件，而非新建文件。
      - 实现顺序：CAD kernel 环境搭建 → 蒙皮实体生成 → 梁/肋生成与裁剪 → 结构装配导出与回读验证 → 翼肋数量与外包盒检查。
      - 梁/肋与蒙皮内表面精确贴合是几何生成目标，不作为自动测试硬门槛。
    acceptance_criteria:
      - POST /geometry/wing-3d 接收 CST 参数、机翼平面参数和完整结构设计参数。
      - 返回 format 为 step、role 为 structural_step 的 geometry_artifact。
      - STEP artifact 文件和同名 JSON sidecar 存在。
      - STEP 覆盖 skin、front_spar、rear_spar 和 ribs 组件。
      - STEP 可被 CAD kernel 回读，组件几何非空。
      - STEP 表示右半翼多组件结构装配，span 为全展长，chord 为恒定弦长。
      - 整体外包盒符合 chord 和 span / 2，翼肋数量符合 rib_spacing 推导规则。
      - 蒙皮外表面保持 CST 截面，结构件裁剪在蒙皮内部并接触蒙皮内表面。
      - 不返回 1000 个三维点云。
      - 坐标系固定为 x = 弦向、y = 厚度方向、z = 展向。
    validation:
      commands:
        - cd backend && pytest

