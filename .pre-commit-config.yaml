repos:
  - repo: local
    hooks:
      - id: file-and-func-limits
        name: Check file (≤200 lines) and function (≤50 lines) limits
        entry: python3 .harness/tool/pre-commit-check.py
        language: system
        files: ^backend/(src|tests)/.*\.py$
        pass_filenames: false
        stages: [pre-commit]
